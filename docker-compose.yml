version: "3.8"

services:
  # Redis for caching (optional for MVP)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  # Node.js API server
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "4000:4000"
    env_file: .env
    depends_on:
      - redis

  # Python AI services
  ai-services:
    build:
      context: apps/ai-services
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env

volumes:
  redis-data:
